name: Build and Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy (e.g., v1.2.3)"
        required: true
        default: "manual-build"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: SPICETIFY_SKIP=true bun run build

      - name: Set Version
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout releases branch
        uses: actions/checkout@v6
        with:
          ref: releases
          path: releases

      - name: Deploy artifacts to releases branch
        run: |
          cd releases

          # Configure Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Prepare directories
          rm -rf latest
          mkdir -p ${{ env.VERSION }}
          mkdir -p latest

          # Copy artifacts
          cp -r ../dist/. ./${{ env.VERSION }}
          cp -r ../dist/. ./latest

          # Generate Readme and version.json
          bun run generate-release-artifacts .

          # Commit and Push
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit. Skipping."
          else
            git commit -m "Deploy: Add artifacts for version ${{ env.VERSION }}"
            git push
          fi

      - name: Create Zip Archives
        run: |
          cd dist && zip -r "../lucid-lyrics-${{ env.VERSION }}.zip" . -x "packages/*" && cd ..
          cd dist/packages && zip -r "../../lucid-lyrics-packages-${{ env.VERSION }}.zip" . && cd ../..
          zip -r "lucid-lyrics-full-${{ env.VERSION }}.zip" dist

      - name: Prepare Specific Assets
        run: |
          cp dist/packages/armenian-transliteration/index.js armenian-transliteration.js
          cp dist/packages/arabic-transliteration/index.js arabic-transliteration.js

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/lucid-lyrics.js
            lucid-lyrics-${{ env.VERSION }}.zip
            lucid-lyrics-full-${{ env.VERSION }}.zip
            lucid-lyrics-packages-${{ env.VERSION }}.zip
            armenian-transliteration.js
            arabic-transliteration.js
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
